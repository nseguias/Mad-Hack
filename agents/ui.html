<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADHACK — Travel Concierge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #111118;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    font-size: 14px;
    font-weight: 700;
    color: #00d4aa;
    font-family: monospace;
    letter-spacing: 1px;
  }
  header h1 {
    font-size: 16px;
    font-weight: 500;
    color: #aaa;
  }
  .status {
    margin-left: auto;
    font-size: 12px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
  }
  .status .dot.online { background: #00d4aa; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 720px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    padding: 12px 16px;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #111118;
    border: 1px solid #1a1a2a;
    padding: 16px 20px;
    border-radius: 16px 16px 16px 4px;
  }
  .msg.assistant h3 { color: #00d4aa; margin-bottom: 8px; font-size: 14px; }
  .msg.assistant strong { color: #fff; }
  .msg.assistant ul { margin: 8px 0 8px 20px; }
  .msg.assistant li { margin: 4px 0; }
  .msg .thinking {
    color: #00d4aa;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg .thinking .dots span {
    animation: blink 1.4s infinite;
    font-size: 18px;
  }
  .msg .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  #input-bar {
    padding: 16px 24px;
    background: #111118;
    border-top: 1px solid #222;
    display: flex;
    gap: 12px;
  }
  #input-bar input {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid #2a2a3a;
    color: #e0e0e0;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-bar input:focus { border-color: #00d4aa; }
  #input-bar input::placeholder { color: #444; }
  #input-bar button {
    background: #00d4aa;
    color: #000;
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #input-bar button:hover { opacity: 0.85; }
  #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
</style>
</head>
<body>

<header>
  <span class="logo">&gt;_MADHACK</span>
  <h1>Travel Concierge</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>
</header>

<div id="chat"></div>

<div id="input-bar">
  <input type="text" id="userInput" placeholder="Plan a trip, find flights, book a hotel..."
         autofocus autocomplete="off" />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

const API = 'http://localhost:8001';
let history = [];

// Check if backend is up
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) {
      statusDot.classList.add('online');
      statusText.textContent = '9 providers online';
    }
  } catch {
    statusDot.classList.remove('online');
    statusText.textContent = 'Offline — start agents';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = formatMarkdown(content);
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking';
  div.innerHTML = '<div class="thinking">Querying providers <div class="dots"><span>.</span><span>.</span><span>.</span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function formatMarkdown(text) {
  return text
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/(<\/ul>\s*<ul>)/g, '')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;
  addMessage('user', text);
  showThinking();

  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });
    const data = await r.json();
    removeThinking();

    const response = data.response || data.error || 'No response';
    addMessage('assistant', response);

    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: response });
    // Keep last 10 exchanges
    if (history.length > 20) history = history.slice(-20);
  } catch (e) {
    removeThinking();
    addMessage('assistant', 'Connection error — are the agents running?');
  }
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !sendBtn.disabled) send();
});
</script>

</body>
</html>
